    # ── Cluster ──
    Cluster:
      type: object
      properties:
        resource_uri:
          type: string
          format: uri
        id:
          type: integer
          description: Cluster ID — used in CourtListener case law URLs.
        docket:
          type: string
          format: uri
          description: API URL of the parent docket.
        sub_opinions:
          type: array
          items:
            type: string
            format: uri
          description: API URLs of opinions in this cluster.
        citations:
          type: array
          items:
            $ref: "#/components/schemas/Citation"
          description: List of parallel citation objects for this cluster.
        judges:
          type: string
          nullable: true
          description: Judge name(s) as a string (not yet normalized).
        panel:
          type: array
          items:
            type: string
            format: uri
          description: API URLs of judges on the panel (normalized).
        non_participating_judges:
          type: array
          items:
            type: string
            format: uri
          description: API URLs of non-participating judges.
        date_created:
          type: string
          format: date-time
        date_modified:
          type: string
          format: date-time
        date_filed:
          type: string
          format: date
          nullable: true
        date_filed_is_approximate:
          type: boolean
        case_name_short:
          type: string
        case_name:
          type: string
          description: Case name frozen at decision time (does not change).
        case_name_full:
          type: string
        slug:
          type: string
        source:
          type: string
          description: Source of this cluster data.
        precedential_status:
          type: string
          description: Whether this cluster is published, unpublished, etc.
        date_blocked:
          type: string
          format: date
          nullable: true
        blocked:
          type: boolean
        syllabus:
          type: string
          nullable: true
        headnotes:
          type: string
          nullable: true
        summary:
          type: string
          nullable: true
        disposition:
          type: string
          nullable: true
        history:
          type: string
          nullable: true
        other_dates:
          type: string
          nullable: true
        cross_reference:
          type: string
          nullable: true
        correction:
          type: string
          nullable: true
        citation_count:
          type: integer
          description: Number of times this cluster has been cited.
        absolute_url:
          type: string
          description: Relative URL path on CourtListener.

    # ── Opinion ──
    Opinion:
      type: object
      properties:
        resource_uri:
          type: string
          format: uri
        id:
          type: integer
        cluster:
          type: string
          format: uri
          description: API URL of the parent cluster.
        opinions_cited:
          type: array
          items:
            type: string
            format: uri
          description: API URLs of other opinions cited by this one.
        date_created:
          type: string
          format: date-time
        date_modified:
          type: string
          format: date-time
        type:
          type: string
          description: |
            Opinion type (e.g. combined opinion, lead opinion, concurrence,
            dissent). Values are number-prefixed for sort priority.
        sha1:
          type: string
          nullable: true
          description: SHA-1 hash of the opinion content.
        download_url:
          type: string
          format: uri
          nullable: true
          description: |
            Original URL where the opinion was scraped from. Often unreliable
            as many courts do not maintain stable URIs.
        local_path:
          type: string
          nullable: true
          description: Path to the binary file for the decision, if available.
        ordering_key:
          type: number
          nullable: true
          description: |
            Sort order within the cluster. Only populated for opinions ingested
            from Harvard or Columbia sources.
        plain_text:
          type: string
          nullable: true
          description: |
            Plain text of the opinion. Populated when sourced from a court
            website as PDF or Microsoft Word document.
        html:
          type: string
          nullable: true
          description: |
            HTML content from court websites (Word Perfect or HTML documents)
            or Resource.org.
        html_lawbox:
          type: string
          nullable: true
          description: HTML content from the Lawbox donation.
        html_columbia:
          type: string
          nullable: true
          description: HTML content from the Columbia collaboration.
        html_anon_2020:
          type: string
          nullable: true
          description: HTML content from the anonymous 2020 source.
        xml_harvard:
          type: string
          nullable: true
          description: |
            XML content from Harvard's Caselaw Access Project. Contains rich
            data but may have OCR artifacts.
        html_with_citations:
          type: string
          nullable: true
          description: |
            **Recommended field.** HTML with citations identified and linked.
            This is the field used on the CourtListener website.
        extracted_by_ocr:
          type: boolean
          description: Whether the text was extracted via OCR.
        author:
          type: string
          format: uri
          nullable: true
          description: API URL of the authoring judge (normalized).
        author_str:
          type: string
          nullable: true
          description: Author name as a string (not normalized).
        joined_by:
          type: array
          items:
            type: string
            format: uri
          description: API URLs of judges who joined this opinion.
        per_curiam:
          type: boolean
          description: Whether this is a per curiam opinion.

    # ── Citation ──
    Citation:
      type: object
      description: A parallel citation for an opinion cluster.
      properties:
        volume:
          type: integer
          nullable: true
          description: The volume number of the reporter.
        reporter:
          type: string
          description: The reporter abbreviation (e.g. "U.S.", "S. Ct.").
        page:
          type: string
          nullable: true
          description: The starting page number in the reporter.
        type:
          type: integer
          description: The citation type identifier.

          format: uri
          nullable: true
          description: API URL of the assigned judge.
        referred_to:
          type: string
          format: uri
          nullable: true
          description: API URL of the referred judge.
        absolute_url:
          type: string
          description: Relative URL path on CourtListener.
        date_created:
          type: string
          format: date-time
        date_modified:
          type: string
          format: date-time
        source:
          type: integer
          description: Numeric source identifier.
        appeal_from_str:
